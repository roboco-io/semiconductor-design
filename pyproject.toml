[project]
name = "semi-design-wiki"
version = "0.1.0"
description = "Semiconductor design domain wiki engine"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "click>=8.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
]
runner = [
    "boto3>=1.34",
    "click>=8",
    "pydantic>=2,<3",
    "ulid-py>=1.1",
    "PyYAML>=6",
]

[project.scripts]
wiki-init = "semi_design_wiki.init_wiki:main"
wiki-sync = "semi_design_wiki.sync_index:main"
wiki-lint = "semi_design_wiki.lint_wiki:main"
semi-run = "semi_design_runner.cli:main"
semi-metric-collector = "semi_design_runner.metric_collector_main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/semi_design_wiki", "src/semi_design_runner"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "slow: expensive tests requiring Docker daemon (opt-in via `-m slow`)",
]

[tool.ruff]
line-length = 100
target-version = "py312"
