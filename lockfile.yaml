# Phase E1 lockfile (real upstream SHAs filled 2026-04-27).
#
# `container_digests.*` remain null until `docker/build-*.sh --push` captures
# ECR-assigned digests via `aws ecr describe-images`. Per
# `src/semi_design_runner/lockfile.py::_strip_nulls`, null values are dropped
# from canonical-yaml before hashing, so adding container digests later does
# NOT change `l1_lockfile_sha` — that invariance is the L1 cache contract
# (spec §9.1).
#
# Source-of-truth for each commit_shas entry (resolved 2026-04-27 via gh API
# + WebFetch on github.com release pages):
#   - openroad   : ORFS rolling-master tip (no tagged releases exist on the
#                  repo; master is the only stable reference).
#   - librelane  : tag 3.0.2 (2025-04-02), the canonical LibreLane release
#                  pinned by overview spec K2 ζ 2026-04-22.
#   - yosys      : tag yosys-0.64 (2026-04-08), latest stable YosysHQ release.
#   - open_pdks  : tag 1.0.581 == master tip (2026-04-24), most recent
#                  RTimothyEdwards open_pdks tag covering sky130A.
#
# Constraints (still in force):
#   1. openroad / open_pdks / librelane: commit SHA-shaped (40-char hex string)
#   2. yosys: release-tag-shaped (e.g. `yosys-0.55`)
#   3. L3-readiness keys (verilator, cocotb, chipyard, gemmini, mlcommons_tiny)
#      MUST stay `null` — they are not part of L1 scope and are filled when
#      L3 is unblocked. A non-null L3 value here will silently expand the
#      `verify_scope("full")` check surface and is a Phase E error, not C.
commit_shas:
  openroad: "e5ce907f878490bf9947347f4cd4b73e97451c80" # ORFS master tip 2026-04-27 (rolling master — no release tags published)
  librelane: "c82049f0234a49bbf72ebcc89539529f31d8997e" # tag 3.0.2 (2025-04-02) — canonical LibreLane release per spec K2 ζ
  yosys: "yosys-0.64" # latest stable YosysHQ release (2026-04-08)
  open_pdks: "78f0ccbb45a0d560890540a1ebc5ccf4d8370c70" # tag 1.0.581 == master tip 2026-04-24 (most recent stable open_pdks tag)
  verilator: null
  cocotb: null
  chipyard: null
  gemmini: null
  mlcommons_tiny: null
container_digests:
  # All null in dry-run; build-*.sh --push fills these from ECR.
  # _strip_nulls() drops them before canonical hashing → L1 cache key invariant.
  #
  # `librelane_base` is the **upstream** ghcr.io/librelane/librelane digest
  # (pinned in librelane-runner.Dockerfile via `FROM ...@sha256:${LIBRELANE_DIGEST}`).
  # Operator resolves it once per LibreLane release and writes it here manually;
  # build-librelane.sh reads but does NOT write it (in contrast to *-runner keys).
  # Resolved 2026-04-27 via `docker manifest inspect ghcr.io/librelane/librelane:3.0.2`
  # — multi-arch manifest list digest (Docker resolves arm64/amd64 at pull time).
  librelane_base: "sha256:4b8a8c160ada41cf10e2e35c7a2ebca6a643b0d399a183793c61119d9637c7c2"
  orfs-runner: null
  librelane-runner: null
  metric-collector: sha256:b132cd6e7dd3524414ebb9593eed10127aef8e1c6925dc9fa4796dc29df2ca0d
source_tarball_mirrors:
  # Metadata-only field (no code path consumes it as of 2026-05-25 — grep src/).
  # Literal `<sha>` placeholder per plan §2.1 (line 5790-5794); production fill
  # resolves to actual tarball SHA at mirror-upload time.
  openroad: "s3://semi-design/mirrors/openroad/<sha>.tar.gz"
  librelane: "s3://semi-design/mirrors/librelane/<sha>.tar.gz"
  yosys: "s3://semi-design/mirrors/yosys/<sha>.tar.gz"
  open_pdks: "s3://semi-design/mirrors/open_pdks/<sha>.tar.gz"
pdk_digests:
  # sky130A content digest is computed AFTER open_pdks builds and writes to
  # $PDK_ROOT in the orfs-runner image. Until then, `null` (same drop semantics).
  sky130A: null
stale_source_policy:
  grace_period_hours: 24
  action_on_failure: ci_red
ci_verification:
  last_green_commit: null
  last_green_at: null
