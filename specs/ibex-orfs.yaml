# Sample spec — ibex RV32IMC core on ORFS stack.
#
# **POST-G1 sample**: `validate_spec_for_g1` (src/semi_design_runner/validator.py)
# currently rejects design != "gcd" with `RejectedNotInG1Scope`. This spec is
# checked in to keep the post-G1 expansion path discoverable and to exercise
# the schema's `Design = Literal["gcd","ibex","aes"]` typing in tests. Direct
# `semi-run init` exits 2 with an explicit rejection until G1_ALLOWED_DESIGNS
# is widened.
#
# Parameter rationale (ibex ≈ 35× gcd cell count):
#   - core_utilization 0.55 / place_density 0.65 → tighter than gcd to keep
#     die area reasonable; still loose enough that PnR converges without
#     timing-driven legalization storms.
#   - clock_period_ps 4000 → 250 MHz, the published ibex sweet spot on
#     sky130A (within ~10% of upstream lowRISC OpenROAD reference flow).
#   - global_routing_iterations 50 → more iterations than gcd; ibex has more
#     wire density and benefits from extra GR convergence rounds.
#   - synth_flatten true → Yosys flattening helps ibex's deep module hierarchy
#     before placement.
#
# Cost budget: $2.00 total. Larger PnR / signoff cost reflects the extra wall
# time vs gcd (~3-4× synthesis, ~5× PnR).
version: 1
run_id: ""
design: ibex
stack: orfs
flow_parameters:
  core_utilization: 0.55
  place_density: 0.65
  clock_period_ps: 4000
  global_routing_iterations: 50
  timing_driven: true
  synth_flatten: true
resource_overrides:
  cpu_units: 8192
  memory_mb: 32768
  ephemeral_storage_gb: 200
compute_budget_usd: 2.00
planned_cost_per_stage_usd:
  rtl-build: 0.10
  synth: 0.40
  pnr: 1.00
  signoff: 0.30
  metrics: 0.20
seed: 44
l1_lockfile_sha: ""
